name: Release

on:
  release:
    types: [published]

env:
  package_type: module
  node_version: 16

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.node_version }}

      - name: Cache Node.js modules
        uses: actions/cache@v5
        with:
          path: .npm
          key: ${{ runner.OS }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-node-
            ${{ runner.OS }}-

      - name: Install dependencies
        run: npm ci --cache .npm --prefer-offline

      - name: Lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.node_version }}

      - name: Cache Node.js modules
        uses: actions/cache@v5
        with:
          path: .npm
          key: ${{ runner.OS }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-node-
            ${{ runner.OS }}-

      - name: Install dependencies
        run: npm ci --cache .npm --prefer-offline

      - name: Extract tag version number
        id: get_version
        uses: battila7/get-version-action@v2

      - name: Substitute Manifest and Download Links For Versioned Ones
        id: sub_manifest_link_version
        env:
          MANIFEST_FILE: 'src/${{ env.package_type }}.json'
          VERSION: ${{ steps.get_version.outputs.version-without-v }}
          URL: https://github.com/${{ github.repository }}
          MANIFEST: https://github.com/${{ github.repository }}/releases/latest/download/${{ env.package_type }}.json
          DOWNLOAD: https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/${{ env.package_type }}.zip
        run: |
          node -e '
            const fs = require("fs");
            const f = process.env.MANIFEST_FILE;
            const m = JSON.parse(fs.readFileSync(f, "utf8"));
            m.version = process.env.VERSION;
            m.url = process.env.URL;
            m.manifest = process.env.MANIFEST;
            m.download = process.env.DOWNLOAD;
            fs.writeFileSync(f, JSON.stringify(m, null, 2) + "\n");
          '

      - name: Build
        run: npm run build

      - name: Archive production artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  publish:
    needs:
      - lint
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download production artifacts for publication
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Create zip file
        working-directory: ./dist
        run: zip -r ../${{ env.package_type }}.zip .

      - name: Create release
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ github.event.release.name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: './dist/${{ env.package_type }}.json, ./${{ env.package_type }}.zip'
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
